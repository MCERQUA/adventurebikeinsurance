[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Lead routing happens server-side via Netlify form notifications.
# Page JS submits through the native Netlify form pipeline (never a direct
# fetch to the webhook), so leads are captured and forwarded reliably.
[[notifications]]
  event = "submission_created"
  form_name = "quote"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=adventurebikeinsurance.com"

[[notifications]]
  event = "submission_created"
  form_name = "contact"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=adventurebikeinsurance.com"
