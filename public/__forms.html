<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>
  <form name="quote" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <input name="bikeMake" />
    <input name="bikeModel" />
    <input name="bikeYear" />
    <input name="bikeValue" />
    <input name="ridingStyle" />
    <input name="coverageType" />
    <input name="internationalRiding" />
    <textarea name="additionalNotes"></textarea>
  </form>
  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="phone" />
    <textarea name="message"></textarea>
  </form>
</body>
</html>
